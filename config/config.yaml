# ============================================================
# NYC Green Infrastructure Pipeline — main config
# ============================================================

project:
  name: nyc-green-infrastructure
  study_area: nyc_5_boroughs
  crs: EPSG:32618          # UTM Zone 18N (meters) — set in preprocessing
  target_resolution_m: 30

paths:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  outputs_dir: outputs
  models_dir: models

  raw:
    landsat_manhattan: data/raw/landsat/manhattan_landsat.tif
    landsat_brooklyn:  data/raw/landsat/brooklyn_landsat.tif
    lst_merged:        data/raw/landsat/nyc_lst.tif
    worldcover:        data/raw/landcover/manhattan_worldcover.tif
    boundaries:        data/raw/boundaries/nyc_boroughs.geojson

# ESA WorldCover -> 3-class simplified taxonomy
# bare/open dropped: <1% of NYC land, zero tiles hit 5% coverage in v2 diagnostics
landcover_classes:
  vegetation: 0
  water: 1
  built_up: 2

landcover_class_names:
  0: Vegetation
  1: Water
  2: Built-up

# Priority scoring weights (must sum to 1.0)
priority_weights:
  heat: 0.25
  vegetation_deficit: 0.30
  built_up: 0.20
  equity: 0.25


priority_thresholds:
  mode: percentile
  percentiles:
    critical: 95    # top 5% of valid pixels
    high: 85        # next 10%
    moderate: 65    # next 20%
    low: 40         # next 25%

  critical: 80
  high: 60
  moderate: 40
  low: 20

# Model training configuration
model:
  architecture: unet
  encoder: resnet18
  encoder_weights: imagenet
  in_channels: 5
  num_classes: 3
  tile_size: 256
  batch_size: 16
  learning_rate: 1.0e-4
  max_epochs: 60
  early_stopping_patience: 10
  focal_loss_alpha: [1.0, 1.5, 0.8]
  focal_loss_gamma: 2.0
  use_balanced_sampler: true
  val_split: 0.15
  test_split: 0.15
  random_seed: 42